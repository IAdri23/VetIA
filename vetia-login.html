<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VetIA — Ingresá</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0F2D4A;--navy2:#1A4A73;--navy-l:#D6E8F5;--navy-ll:#EBF4FB;
  --teal:#0A6E6E;--teal2:#0D9B9B;--teal-l:#C8EEEE;--teal-ll:#E8F8F8;
  --green:#1A6B3A;--green2:#25A05A;--green-l:#C5EDD8;
  --bg:#F0EDE6;--white:#FFFFFF;
  --txt:#0F1923;--txt2:#3A4A58;--txt3:#7A8A98;
  --border:#D8D3CA;
  --r:14px;--r2:10px;
  --shadow:0 2px 12px rgba(15,45,74,0.08);--shadow2:0 8px 32px rgba(15,45,74,0.15);
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem}

/* HERO TOP */
.login-hero{text-align:center;margin-bottom:2rem}
.logo-mark{width:64px;height:64px;background:linear-gradient(135deg,var(--navy),var(--teal));border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 1rem;box-shadow:var(--shadow2)}
.logo-name{font-family:'Fraunces',serif;font-size:32px;font-weight:700;color:var(--navy);letter-spacing:-1px}
.logo-name span{color:var(--teal2)}
.logo-tag{font-size:13px;color:var(--txt3);margin-top:4px}

/* CARD */
.login-card{background:var(--white);border-radius:var(--r);border:1px solid var(--border);padding:2rem;width:100%;max-width:400px;box-shadow:var(--shadow2)}

/* TABS */
.tabs{display:flex;background:var(--bg);border-radius:var(--r2);padding:3px;margin-bottom:1.5rem;border:1px solid var(--border)}
.tab{flex:1;text-align:center;padding:9px;border-radius:8px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;color:var(--txt3);transition:all .18s}
.tab.active{background:var(--white);color:var(--navy);box-shadow:var(--shadow)}

/* GOOGLE BTN */
.btn-google{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:var(--white);color:var(--txt);border:1.5px solid var(--border);border-radius:var(--r2);padding:13px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .18s;margin-bottom:1rem}
.btn-google:hover{border-color:var(--navy2);background:var(--navy-ll);transform:translateY(-1px);box-shadow:var(--shadow)}
.google-ico{width:20px;height:20px;flex-shrink:0}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
.divider-line{flex:1;height:1px;background:var(--border)}
.divider-txt{font-size:12px;color:var(--txt3);font-weight:600}

/* FORM */
.fgroup{margin-bottom:1rem}
.fgroup label{display:block;font-size:11px;font-weight:700;color:var(--txt2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.fgroup input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r2);font-size:14px;font-family:inherit;background:var(--bg);color:var(--txt);outline:none;transition:all .18s}
.fgroup input:focus{border-color:var(--teal2);background:var(--white);box-shadow:0 0 0 3px rgba(13,155,155,0.1)}
.fgroup input::placeholder{color:var(--txt3)}

/* SUBMIT BTN */
.btn-submit{width:100%;background:linear-gradient(135deg,var(--navy),var(--teal));color:#fff;border:none;border-radius:var(--r2);padding:13px;font-size:14px;font-weight:800;font-family:inherit;cursor:pointer;transition:all .18s;margin-top:.5rem}
.btn-submit:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 16px rgba(15,45,74,0.25)}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;transform:none}

/* MESSAGES */
.msg{padding:10px 14px;border-radius:var(--r2);font-size:13px;font-weight:600;margin-bottom:1rem;display:none}
.msg.error{background:#FEF0F0;color:#8B1A1A;border:1px solid #F5C5C5}
.msg.success{background:var(--green-l);color:var(--green);border:1px solid var(--green-l)}
.msg.show{display:block}

/* FOOTER */
.login-footer{text-align:center;margin-top:1.5rem;font-size:12px;color:var(--txt3);line-height:1.6}
.login-footer a{color:var(--teal2);font-weight:600;cursor:pointer;text-decoration:none}

/* LOADING */
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(15,45,74,0.5);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.loading-overlay.show{display:flex}
.loading-spinner{width:48px;height:48px;border:4px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
.loading-txt{color:#fff;font-size:14px;font-weight:700}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-txt">Iniciando sesión...</div>
</div>

<div class="login-hero">
  <svg width="80" height="80" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" style="margin:0 auto;display:block"><rect width="120" height="120" rx="28" fill="#0F2D4A"/><polyline points="10,62 26,62 33,38 41,74 48,50 56,62 70,62" fill="none" stroke="#0D9B9B" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="82" cy="56" r="9" fill="#0D9B9B"/><circle cx="73" cy="48" r="4.5" fill="#0D9B9B"/><circle cx="82" cy="45" r="4.5" fill="#0D9B9B"/><circle cx="91" cy="48" r="4.5" fill="#0D9B9B"/><circle cx="97" cy="56" r="3.8" fill="#0D9B9B" opacity=".85"/><circle cx="67" cy="56" r="3.8" fill="#0D9B9B" opacity=".85"/></svg>
  <div class="logo-name">Vet<span>IA</span></div>
  <div class="logo-tag">El asistente inteligente de tu mascota</div>
</div>

<div class="login-card">
  <div class="tabs">
    <button class="tab active" id="tab-login" onclick="setTab('login')">Ingresar</button>
    <button class="tab" id="tab-register" onclick="setTab('register')">Registrarse</button>
  </div>

  <div id="msg-box" class="msg"></div>

  <!-- GOOGLE -->
  <button class="btn-google" onclick="loginGoogle()">
    <svg class="google-ico" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continuar con Google
  </button>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-txt">o con email</div>
    <div class="divider-line"></div>
  </div>

  <!-- LOGIN FORM -->
  <div id="form-login">
    <div class="fgroup">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="tu@email.com"/>
    </div>
    <div class="fgroup">
      <label>Contraseña</label>
      <input type="password" id="login-pass" placeholder="Tu contraseña" onkeydown="if(event.key==='Enter')submitLogin()"/>
    </div>
    <button class="btn-submit" id="btn-login" onclick="submitLogin()">Ingresar →</button>
    <div style="text-align:center;margin-top:12px">
      <a style="font-size:12px;color:var(--teal2);font-weight:600;cursor:pointer" onclick="forgotPassword()">¿Olvidaste tu contraseña?</a>
    </div>
  </div>

  <!-- REGISTER FORM -->
  <div id="form-register" style="display:none">
    <div class="fgroup">
      <label>Nombre</label>
      <input type="text" id="reg-nombre" placeholder="Tu nombre"/>
    </div>
    <div class="fgroup">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="tu@email.com"/>
    </div>
    <div class="fgroup">
      <label>Contraseña</label>
      <input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres" onkeydown="if(event.key==='Enter')submitRegister()"/>
    </div>
    <button class="btn-submit" id="btn-register" onclick="submitRegister()">Crear cuenta →</button>
  </div>
</div>

<div class="login-footer">
  Al ingresar aceptás los <a>Términos y condiciones</a> de VetIA.<br>
  Tus datos están protegidos y nunca se comparten.
</div>

<script>
const SUPABASE_URL = 'https://ctgictsjkwozlubiijan.supabase.co';
const SUPABASE_KEY = 'sb_publishable_1fAdcF-uwjDdoxnL8YrUSw_-0jlAjah';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Verificar si ya hay sesión activa
sb.auth.getSession().then(({data:{session}})=>{
  if(session) goToApp();
});

// Escuchar cambios de auth (para cuando vuelve de Google OAuth)
sb.auth.onAuthStateChange((event, session)=>{
  if(event==='SIGNED_IN' && session) goToApp();
});

function goToApp(){
  window.location.href='vetia-app.html';
}

function setTab(t){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  document.getElementById('form-login').style.display=t==='login'?'block':'none';
  document.getElementById('form-register').style.display=t==='register'?'block':'none';
  hideMsg();
}

function showMsg(txt,type){
  const el=document.getElementById('msg-box');
  el.textContent=txt;el.className='msg '+type+' show';
}
function hideMsg(){
  document.getElementById('msg-box').className='msg';
}

function showLoading(){document.getElementById('loading').classList.add('show');}
function hideLoading(){document.getElementById('loading').classList.remove('show');}

async function loginGoogle(){
  showLoading();
  const{error}=await sb.auth.signInWithOAuth({
    provider:'google',
    options:{redirectTo:window.location.origin+'/vetia-app.html'}
  });
  if(error){hideLoading();showMsg('❌ Error al conectar con Google. Intentá de nuevo.','error');}
}

async function submitLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  if(!email||!pass){showMsg('⚠️ Completá email y contraseña','error');return;}
  const btn=document.getElementById('btn-login');
  btn.disabled=true;btn.textContent='Ingresando...';
  const{error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){
    showMsg('❌ '+(error.message.includes('Invalid')?'Email o contraseña incorrectos':error.message),'error');
    btn.disabled=false;btn.textContent='Ingresar →';
  }
}

async function submitRegister(){
  const nombre=document.getElementById('reg-nombre').value.trim();
  const email=document.getElementById('reg-email').value.trim();
  const pass=document.getElementById('reg-pass').value;
  if(!nombre||!email||!pass){showMsg('⚠️ Completá todos los campos','error');return;}
  if(pass.length<6){showMsg('⚠️ La contraseña debe tener al menos 6 caracteres','error');return;}
  const btn=document.getElementById('btn-register');
  btn.disabled=true;btn.textContent='Creando cuenta...';
  const{data,error}=await sb.auth.signUp({email,password:pass,options:{data:{nombre}}});
  if(error){
    showMsg('❌ '+error.message,'error');
    btn.disabled=false;btn.textContent='Crear cuenta →';
  } else {
    showMsg('✅ ¡Cuenta creada! Revisá tu email para confirmar y después ingresá.','success');
    btn.disabled=false;btn.textContent='Crear cuenta →';
  }
}

async function forgotPassword(){
  const email=document.getElementById('login-email').value.trim();
  if(!email){showMsg('⚠️ Escribí tu email arriba primero','error');return;}
  const{error}=await sb.auth.resetPasswordForEmail(email);
  if(error)showMsg('❌ '+error.message,'error');
  else showMsg('✅ Te mandamos un email para restablecer tu contraseña','success');
}
</script>
</body>
</html>
